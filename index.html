<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Basic Web Designing Skills</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

:root {

    --bg-color: #08142f;

    --text-primary: #ffffff;
    --text-secondary: #9ca3af;

    --card-bg: rgba(20, 33, 61, 0.92);
    --card-border: rgba(255,255,255,0.08);
}

/* BODY */

body {

    margin: 0;
    padding: 0;

    min-height: 100vh;

    font-family: 'Outfit', sans-serif;

    background:
        radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.15), transparent 35%),
        var(--bg-color);

    color: var(--text-primary);

    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 2rem;

    box-sizing: border-box;
}

/* HEADER */

header {

    text-align: center;

    margin-bottom: 4rem;
}

h1 {

    margin: 0;

    font-size: 4.5rem;

    font-weight: 800;

    background: linear-gradient(
        to right,
        #5ea2ff,
        #b38cff
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h2 {

    margin-top: 1rem;

    font-size: 1.5rem;

    font-weight: 400;

    color: var(--text-secondary);

    letter-spacing: 1px;
}

/* MAIN */

main {

    display: flex;

    gap: 4rem;

    flex-wrap: wrap;

    justify-content: center;

    width: 100%;

    max-width: 1400px;
}

/* CARD */

.frame-section {

    width: 100%;

    max-width: 560px;

    padding: 3rem;

    border-radius: 28px;

    background: var(--card-bg);

    border: 1px solid var(--card-border);

    backdrop-filter: blur(18px);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.45);

    transition: 0.4s ease;
}

.frame-section:hover {

    transform: translateY(-8px);

    box-shadow:
        0 25px 70px rgba(0,0,0,0.55);
}

/* SECTION TITLE */

.section-title {

    text-align: center;

    font-size: 2.2rem;

    font-weight: 700;

    margin-bottom: 3rem;

    position: relative;
}

.section-title::after {

    content: '';

    position: absolute;

    left: 50%;
    bottom: -14px;

    transform: translateX(-50%);

    width: 100px;
    height: 5px;

    border-radius: 20px;
}

.practical-title::after {

    background: linear-gradient(
        to right,
        #4f8cff,
        #8b5cf6
    );
}

.code-title::after {

    background: linear-gradient(
        to right,
        #19d39a,
        #0ca678
    );
}

/* BUTTON GRID */

.button-grid {

    display: grid;

    grid-template-columns: repeat(2, 1fr);

    gap: 1.5rem;
}

/* LINKS */

.button-grid a {

    width: 100%;

    text-decoration: none;
}

/* BUTTON */

.animated-btn {

    width: 100%;

    height: 78px;

    border: none;

    border-radius: 18px;

    cursor: pointer;

    font-family: 'Outfit', sans-serif;

    font-size: 1.2rem;

    font-weight: 700;

    color: white;

    display: flex;

    align-items: center;

    justify-content: center;

    position: relative;

    overflow: hidden;

    transition: all 0.35s ease;

    background: linear-gradient(
        135deg,
        #4f8cff,
        #8b5cf6
    );

    box-shadow:
        0 10px 25px rgba(59,130,246,0.25);
}

/* HOVER EFFECT */

.animated-btn:hover {

    transform: translateY(-5px);

    box-shadow:
        0 18px 40px rgba(59,130,246,0.45);
}

/* SHINE EFFECT */

.animated-btn::before {

    content: '';

    position: absolute;

    top: 0;
    left: -100%;

    width: 100%;
    height: 100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.25),
            transparent
        );

    transition: 0.8s;
}

.animated-btn:hover::before {

    left: 100%;
}

/* CODE BUTTON */

.code-btn {

    background: linear-gradient(
        135deg,
        #19d39a,
        #0ca678
    );

    box-shadow:
        0 10px 25px rgba(16,185,129,0.25);
}

.code-btn:hover {

    box-shadow:
        0 18px 40px rgba(16,185,129,0.45);
}

/* MINI PROJECT FULL WIDTH */

.special-link {

    grid-column: span 2;
}

.special-btn {

    width: 100%;

    height: 85px;

    border-radius: 20px;

    font-size: 1.4rem;

    letter-spacing: 1px;

    background: linear-gradient(
        135deg,
        #ffb000,
        #ff4d4d
    );

    box-shadow:
        0 12px 30px rgba(255,140,0,0.35);
}

.special-btn:hover {

    box-shadow:
        0 18px 45px rgba(255,140,0,0.5);
}

/* RESPONSIVE */

@media (max-width: 768px) {

    h1 {

        font-size: 3rem;
    }

    h2 {

        font-size: 1.1rem;
    }

    .frame-section {

        padding: 2rem;
    }
}

@media (max-width: 480px) {

    body {

        padding: 1rem;
    }

    h1 {

        font-size: 2.3rem;
    }

    .button-grid {

        grid-template-columns: 1fr;
    }

    .special-link {

        grid-column: span 1;
    }

    .animated-btn {

        height: 72px;

        font-size: 1rem;
    }

    .special-btn {

        font-size: 1.15rem;
    }
}

</style>
</head>

<body>

<header>

    <h1>Basic Web Designing Skills</h1>

    <h2>Skill Based Practical Course</h2>

</header>

<main>

    <!-- PRACTICAL EXERCISES -->

    <section class="frame-section">

            <a href="exvercise3code.pdf" target="_blank">

</body>
</html>
